name: "petClinic CI"


on: 
    pull_request: {}

permissions: 
    contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: petClinic
    strategy:
      matrix:
        node-version: [22.4.0]
    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install
    - name: Run build
      run: pnpm run build
    - name: run tests
      run: pnpm run test