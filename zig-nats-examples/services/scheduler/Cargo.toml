[package]
name = "scheduler"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
async-nats = { version = "0.47", features = ["jetstream", "service"] }
futures = "0.3"
bytes = "1.0"
mongodb = "3.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
config = { path = "../../packages/config" }
shared-auth = { path = "../../packages/shared-auth" }
chrono = { version = "0.4", features = ["serde"] }
cron = "0.12"
tower-http = { version = "0.6.8", features = ["cors"] }
