---
# Source: event-platform/templates/deployments.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: "event-platform/auth:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: APP_SERVER__PORT
          value: "3000"
        - name: APP_NATS__URL
          value: "nats://nats:4222"
        - name: APP_MONGODB__URL
          value: "mongodb://mongodb:27017"
        - name: APP_MONGODB__DB_NAME
          value: "auth_db"
        - name: APP_AUTH__JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
