version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: ["--js", "--sd", "/data"]
    volumes:
      - nats_data:/data
    networks:
      - nats-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - nats-net

networks:
  nats-net:
    driver: bridge

volumes:
  nats_data:
  mongo_data:
