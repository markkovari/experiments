version: '3.8'

services:
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: ["--js", "--sd", "/data"]
    volumes:
      - nats_data:/data
    networks:
      - nats-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - nats-net

  auth:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth
    container_name: auth
    ports:
      - "3000:3000"
    environment:
      - APP_NATS__URL=nats://nats:4222
      - APP_MONGODB__URL=mongodb://admin:password@mongodb:27017
    depends_on:
      - nats
      - mongodb
    networks:
      - nats-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - APP_NATS__URL=nats://nats:4222
      - APP_MONGODB__URL=mongodb://mongodb:27017
      - AUTH_SERVICE_URL=http://auth:3000
    depends_on:
      - nats
      - mongodb
      - auth
    networks:
      - nats-net

networks:
  nats-net:
    driver: bridge

volumes:
  nats_data:
  mongo_data:
