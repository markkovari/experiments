apiVersion: v1
kind: Service
metadata:
  name: org
spec:
  selector:
    app: org
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: org
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org
  template:
    metadata:
      labels:
        app: org
    spec:
      containers:
        - name: org
          image: "{{ .Values.services_base_repo }}/org:{{ .Values.image_tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: APP_DATABASE__NAME
              value: "org_db"
            - name: APP_NATS__URL
              value: "nats://nats:4222"
            - name: APP_MONGODB__URL
              value: "mongodb://admin:password@mongodb:27017"
            - name: APP_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-secret
