services:
  nats:
    image: nats
    ports:
      - "8222:8222"
      - "4222:4222"
    command: "-js -c /etc/nats/nats-server.conf"
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    networks: ["nats"]

networks:
  nats:
    name: nats

volumes:
  nats-data: {}
