services:
  nats:
    image: nats
    ports:
      - "8222:8222"
      - "4222:4222"
    command: "-js -c /etc/nats/nats-server.conf"
    volumes:
      - ./infra/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    networks: [local]

  postgresql:
    image: postgres:latest
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data


networks:
  local:
    name: local

volumes:
  nats-data: {}
  db_data: {}
