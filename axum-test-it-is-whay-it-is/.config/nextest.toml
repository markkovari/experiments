# Nextest configuration for axum-test-it-is-whay-it-is

[profile.default]
# Run tests with all available CPUs
test-threads = "num-cpus"

# Show output for failing tests
failure-output = "immediate"

# Show output for passing tests
success-output = "never"

# Show test execution time
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile for more detailed output
failure-output = "immediate-final"
success-output = "final"
fail-fast = false

# Retry flaky tests
retries = 2

[profile.integration]
# Profile for integration tests with longer timeouts
test-threads = 4
slow-timeout = { period = "120s" }
