[profile.default]
# Run tests in parallel with multiple threads
test-threads = "num-cpus"

# Retry failed tests up to 2 times
retries = 2

# Show test output for failed tests
failure-output = "immediate"
success-output = "never"

# Timeout settings
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile with more retries and longer timeouts
retries = 3
slow-timeout = { period = "120s", terminate-after = 3 }
failure-output = "immediate-final"
success-output = "never"

# Store test results
[profile.ci.junit]
path = "target/nextest/ci/junit.xml"

[profile.integration]
# Profile for integration tests
test-threads = 4
slow-timeout = { period = "120s" }
retries = 1

[profile.e2e]
# Profile for e2e tests - run sequentially due to Docker containers
test-threads = 1
slow-timeout = { period = "300s" }
retries = 1

[profile.unit]
# Profile for fast unit tests only
test-threads = "num-cpus"
slow-timeout = { period = "30s" }
