services:
  # SurrealDB Database
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: surreal-backend-db
    command: start --log info --user root --pass root memory
    ports:
      - "8000:8000"
    networks:
      - surreal-network
    restart: unless-stopped

  # Veterinary Clinic API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: surreal-backend-api
    depends_on:
      surrealdb:
        condition: service_started
    environment:
      - DATABASE_URL=http://surrealdb:8000
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=root
      - PORT=3000
      - RUST_LOG=info
      - JWT_SECRET=dev-secret-key-change-in-production-very-secure-key-min-32-chars-recommended
      - JWT_EXPIRATION=3600
    ports:
      - "3000:3000"
    networks:
      - surreal-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: surreal-backend-frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - surreal-network
    restart: unless-stopped

networks:
  surreal-network:
    driver: bridge
