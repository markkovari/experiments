apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: wasmcloud-secrets-kv
  annotations:
    description: "Secret store backed by NATS KV with AES-256-GCM encryption at rest"
spec:
  components:
    # HTTP admin endpoint for managing secrets
    - name: secrets-http
      type: component
      properties:
        image: file://../target/wasm32-wasip1/release/secrets_http.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: nats-kv
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            source_config:
              - name: secrets-init
                properties:
                  backend: "kv"
                  namespace: "secrets"
                  # encryption-key: set this to a base64-encoded 32-byte AES-256 key
                  # e.g.: openssl rand -base64 32
                  encryption-key: "qLwzYh6EnHqLvRZsH9a9N4YMoxXpDlWICqsBfMMnnAw="
            target_config:
              - name: secrets-kv-bucket
                properties:
                  bucket: "wasmcloud-secrets"

    # Standalone secrets component (importable by other components)
    - name: secrets-component
      type: component
      properties:
        image: file://../target/wasm32-wasip1/release/secrets_component.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: nats-kv
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            source_config:
              - name: secrets-component-init
                properties:
                  backend: "kv"
                  namespace: "secrets"
                  encryption-key: "qLwzYh6EnHqLvRZsH9a9N4YMoxXpDlWICqsBfMMnnAw="
            target_config:
              - name: secrets-component-kv-bucket
                properties:
                  bucket: "wasmcloud-secrets"

    # NATS KV capability provider
    - name: nats-kv
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
