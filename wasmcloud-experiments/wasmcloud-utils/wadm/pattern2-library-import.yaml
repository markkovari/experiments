apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: consumer-with-ratelimit
  annotations:
    version: v0.1.0
    description: "Pattern 2: Library Import - Consumer imports rate limiter directly"
spec:
  components:
    # Your app that imports the rate limiter
    - name: consumer-app
      type: component
      properties:
        image: file://../target/wasm32-wasip1/release/consumer_app.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        # The consumer app imports rate limiter functionality
        # and uses it internally - no separate rate limiter component needed!
        - type: link
          properties:
            target: httpserver
            namespace: wasi
            package: http
            interfaces:
              - incoming-handler
            source_config:
              - name: default-http
                properties:
                  address: 0.0.0.0:8081

    # HTTP server capability provider
    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.23.1

# Note: In this pattern, the rate limiter code is COMPILED INTO the consumer-app.
# No separate rate limiter component is deployed!
