apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: distributed-lock
  annotations:
    version: v0.1.0
    description: "Distributed lock component backed by NATS KV store"
spec:
  components:
    - name: distributed-lock-component
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/distributed_lock_component.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: nats-kv
            namespace: wasi
            package: keyvalue
            interfaces:
              - store
            target_config:
              - name: bucket
                properties:
                  bucket: distributed-lock

    - name: nats-kv
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
