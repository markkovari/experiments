apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: retry
  annotations:
    version: v0.1.0
    description: "Retry-with-backoff policy component (fixed, exponential, exponential+jitter)"
spec:
  components:
    - name: retry-component
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/retry_component.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
