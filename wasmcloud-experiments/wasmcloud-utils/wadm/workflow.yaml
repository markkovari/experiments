apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: workflow
  annotations:
    version: v0.1.0
    description: "DAG-based workflow engine with step memoisation and retry support"
spec:
  components:
    - name: workflow-component
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/workflow_component.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
