apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: workflow-api
  annotations:
    version: v0.9.0
    description: "HTTP REST API for workflow definition and execution management"
spec:
  components:
    - name: workflow-api-component
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/workflow_api.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: workflow-store-kv
            namespace: wasmcloud
            package: workflow-store
            interfaces: [store]

    - name: workflow-store-kv
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/workflow_store_kv.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: nats-kv
            namespace: wasi
            package: keyvalue
            interfaces: [store]
            target_config:
              - name: bucket
                properties:
                  bucket: workflow

    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.27.0
      traits:
        - type: link
          properties:
            target: workflow-api-component
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source_config:
              - name: default-http
                properties:
                  address: 0.0.0.0:8080

    - name: nats-kv
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
