apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: cache
  annotations:
    version: v0.1.0
    description: "TTL-aware cache component backed by NATS KV store"
spec:
  components:
    - name: cache-component
      type: component
      properties:
        image: file://../target/wasm32-wasip2/release/cache_component.wasm
      traits:
        - type: spreadscaler
          properties:
            replicas: 1
        - type: link
          properties:
            target: nats-kv
            namespace: wasi
            package: keyvalue
            interfaces:
              - store
            target_config:
              - name: bucket
                properties:
                  bucket: cache

    - name: nats-kv
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
