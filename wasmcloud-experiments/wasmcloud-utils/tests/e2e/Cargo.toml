[package]
name = "e2e-tests"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.42", features = ["full"] }
idempotency-core = { path = "../../idempotency/core" }
event-trigger-core = { path = "../../event-trigger/core" }
job-queue-core = { path = "../../job-queue/core" }
workflow-core = { path = "../../workflow/core" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-nats = "0.37"
futures = "0.3"
bytes = "1"

[dev-dependencies]
test-log = "0.2"
env_logger = "0.11"
