[package]
name = "workflow-store-kv"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[package.metadata.component]
package = "wasmcloud:workflow-store-kv"

[package.metadata.component.target]
path = "wit"
world = "workflow-store-kv-component"

[package.metadata.component.target.dependencies]
"wasmcloud:workflow-store" = { path = "wit/deps/wasmcloud-workflow-store" }
"wasi:keyvalue" = { path = "wit/deps/wasi-keyvalue-0.2.0-draft" }
