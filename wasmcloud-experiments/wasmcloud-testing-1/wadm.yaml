apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: http-kv-counter
  annotations:
    description: "HTTP server with NATS KV counter with 60-second TTL"
spec:
  components:
    - name: http-kv-counter
      type: component
      properties:
        image: file://./build/http_kv_counter_s.wasm
      traits:
        - type: spreadscaler
          properties:
            instances: 10
        - type: link
          properties:
            target: keyvalue-nats
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target_config:
              - name: counters-config
                properties:
                  bucket: default
                  max_age: 60s

    # HTTP Server provider
    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.23.1
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            target: http-kv-counter
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source_config:
              - name: default-http
                properties:
                  address: 0.0.0.0:8080

    # NATS KV provider
    - name: keyvalue-nats
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
      traits:
        - type: spreadscaler
          properties:
            instances: 1
