services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "6500:5432"
    restart: always
    env_file:
      - ./.env
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${APP_PORT}:80"
    restart: always
    env_file:
      - ./.env
