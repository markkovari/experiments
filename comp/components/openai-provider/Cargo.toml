[package]
name = "openai-provider"
description = "Concrete LLM provider implementing llm:inference over an OpenAI-compatible HTTP API (openai:provider)"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen-rt = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[package.metadata.component]
package = "openai:component"

[package.metadata.component.target]
path = "wit"
world = "openai-provider"

[package.metadata.component.target.dependencies]
"llm:inference" = { path = "../llm-inference/wit" }
"wasi:http" = { path = "../../wit/deps/wasi-http-0.2.0" }
"wasi:io" = { path = "../../wit/deps/wasi-io-0.2.0" }
"wasi:clocks" = { path = "../../wit/deps/wasi-clocks-0.2.0" }
"wasi:random" = { path = "../../wit/deps/wasi-random-0.2.0" }
"wasi:cli" = { path = "../../wit/deps/wasi-cli-0.2.0" }
"wasi:config" = { path = "../../wit/deps/wasi-config-0.2.0-draft" }
