[package]
name = "vet-domain"
description = "The vet-clinic domain (pets/appointments/notes) as a WIT HTTP component — orchestrates auth:identity + records:store + validate + search (vet:domain)"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen-rt = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[package.metadata.component]
package = "vet:component"

[package.metadata.component.target]
path = "wit"
world = "vet-domain"

[package.metadata.component.target.dependencies]
"auth:identity" = { path = "../../wit" }
"records:store" = { path = "../record-store/wit" }
"validate:schema" = { path = "../validate/wit" }
"search:index" = { path = "../search-index/wit" }
# auth.wit's own world imports these; needed to merge the auth:identity package.
"ratelimit:guard" = { path = "../rate-limiter/wit" }
"audit:log" = { path = "../audit-log/wit" }
# full-parity capability contracts.
"blob:store" = { path = "../blob-store/wit" }
"upload:policy" = { path = "../upload-policy/wit" }
"fsm:workflow" = { path = "../fsm-workflow/wit" }
"money:amount" = { path = "../money/wit" }
"md:render" = { path = "../markdown/wit" }
"csv:codec" = { path = "../csv/wit" }
"pii:redact" = { path = "../pii-redact/wit" }
"otp:totp" = { path = "../otp/wit" }
"secrets:vault" = { path = "../secrets-vault/wit" }
"i18n:catalog" = { path = "../i18n-catalog/wit" }
"paginate:cursor" = { path = "../pagination/wit" }
"ai:inference" = { path = "../ai-inference/wit" }
# ai:inference's package references llm:inference (the provider boundary).
"llm:inference" = { path = "../llm-inference/wit" }
"cache:store" = { path = "../cache/wit" }
"sched:timer" = { path = "../scheduler-timer/wit" }
"lock:mutex" = { path = "../lock-mutex/wit" }
"event:bus" = { path = "../event-bus/wit" }
"wasi:http" = { path = "../../wit/deps/wasi-http-0.2.0" }
"wasi:io" = { path = "../../wit/deps/wasi-io-0.2.0" }
"wasi:clocks" = { path = "../../wit/deps/wasi-clocks-0.2.0" }
"wasi:cli" = { path = "../../wit/deps/wasi-cli-0.2.0" }
"wasi:random" = { path = "../../wit/deps/wasi-random-0.2.0" }
"wasi:keyvalue" = { path = "../../wit/deps/wasi-keyvalue-0.2.0-draft" }
"wasi:config" = { path = "../../wit/deps/wasi-config-0.2.0-draft" }
