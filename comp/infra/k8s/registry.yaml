# In-cluster OCI registry for component images. NodePort 30500 so the host can
# `wash push localhost:30500/...` and the wasmCloud host pod can pull via the
# in-cluster service DNS (registry.wasmcloud.svc.cluster.local:5000).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: wasmcloud
spec:
  replicas: 1
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: wasmcloud
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
