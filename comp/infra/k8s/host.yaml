# wasmCloud host for the comp-auth app (OAM operator model, the model the
# installable operator actually serves: k8s.wasmcloud.dev/v1alpha1 +
# core.oam.dev/v1beta1). Schema matches the running operator's CRD.
#
# - natsAddress: in-cluster NATS (JetStream) — the wasi:keyvalue backend.
# - allowedInsecure: the in-cluster registry we push components to.
# - lattice: isolated from other apps on the cluster.
apiVersion: k8s.wasmcloud.dev/v1alpha1
kind: WasmCloudHostConfig
metadata:
  name: comp-auth-host
  namespace: comp-auth
spec:
  hostReplicas: 1
  lattice: comp-auth
  version: "1.4.1"
  natsAddress: nats://nats.wasmcloud.svc.cluster.local
  natsClientPort: 4222
  jetstreamDomain: default
  leafNodeDomain: leaf
  logLevel: info
  allowLatest: true
  allowedInsecure:
    - registry.wasmcloud.svc.cluster.local:5000
