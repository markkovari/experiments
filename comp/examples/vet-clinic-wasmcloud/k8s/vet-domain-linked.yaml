    - name: scheduler-timer
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-scheduler-timer:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: schedulertimer-bucket
                  properties:
                    bucket: schedulertimer
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: lock-mutex
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-lock-mutex:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: lockmutex-bucket
                  properties:
                    bucket: lockmutex
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: event-bus
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-event-bus:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: eventbus-bucket
                  properties:
                    bucket: eventbus
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.23.1
      traits:
        - type: link
          properties:
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source:
              config:
                - name: listen
                  properties:
                    address: 0.0.0.0:8081
            target:
              name: vet-domain
    - name: httpclient
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-client:0.13.0
    - name: keyvalue-nats
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-nats:0.3.1
