# FULL vet-clinic on wasmCloud — LINKED topology (generated by gen-manifest.py).
# Every capability is a SEPARATE component wired to vet-domain by wadm links —
# NOT one wac-fused blob (that overflows wasmtime's 30 nested-instance per-
# component limit). This is the idiomatic wasmCloud shape; the host runs all ~20
# components + their links, well within its multi-thousand instance density.
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: vet-domain
  namespace: vet-clinic
  annotations:
    version: v0.1.0
    description: "Full vet-clinic, linked-component topology, on wasmCloud k8s"
spec:
  components:
    - name: vet-domain
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-vet-domain:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            namespace: auth
            package: identity
            interfaces: [accounts, session, authorizer, rbac, types]
            target:
              name: auth-guard
        - type: link
          properties:
            namespace: records
            package: store
            interfaces: [store]
            target:
              name: records-store
        - type: link
          properties:
            namespace: validate
            package: schema
            interfaces: [validator]
            target:
              name: validate
        - type: link
          properties:
            namespace: search
            package: index
            interfaces: [index]
            target:
              name: search-index
        - type: link
          properties:
            namespace: upload
            package: policy
            interfaces: [gate]
            target:
              name: upload-policy
        - type: link
          properties:
            namespace: blob
            package: store
            interfaces: [blobstore]
            target:
              name: blob-store
        - type: link
          properties:
            namespace: fsm
            package: workflow
            interfaces: [engine]
            target:
              name: fsm-workflow
        - type: link
          properties:
            namespace: money
            package: amount
            interfaces: [arithmetic]
            target:
              name: money
        - type: link
          properties:
            namespace: md
            package: render
            interfaces: [renderer]
            target:
              name: markdown
        - type: link
          properties:
            namespace: csv
            package: codec
            interfaces: [codec]
            target:
              name: csv
        - type: link
          properties:
            namespace: pii
            package: redact
            interfaces: [redactor]
            target:
              name: pii-redact
        - type: link
          properties:
            namespace: otp
            package: totp
            interfaces: [authenticator]
            target:
              name: otp
        - type: link
          properties:
            namespace: secrets
            package: vault
            interfaces: [vault]
            target:
              name: secrets-vault
        - type: link
          properties:
            namespace: paginate
            package: cursor
            interfaces: [cursors]
            target:
              name: pagination
        - type: link
          properties:
            namespace: i18n
            package: catalog
            interfaces: [catalog]
            target:
              name: i18n-catalog
        - type: link
          properties:
            namespace: ai
            package: inference
            interfaces: [inference]
            target:
              name: ai-inference
        - type: link
          properties:
            namespace: cache
            package: store
            interfaces: [cache]
            target:
              name: cache
        - type: link
          properties:
            namespace: sched
            package: timer
            interfaces: [timer]
            target:
              name: scheduler-timer
        - type: link
          properties:
            namespace: lock
            package: mutex
            interfaces: [mutex]
            target:
              name: lock-mutex
        - type: link
          properties:
            namespace: event
            package: bus
            interfaces: [bus]
            target:
              name: event-bus
    - name: auth-guard
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-auth-guard:0.1.0
        config:
          - name: auth-guard-config
            properties:
              default-tenant: "acme-vet"
              session-ttl: "3600"
              password-min-len: "8"
              audit-enabled: "true"
              max-attempts: "5"
              lockout-window: "300"
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: authguard-bucket
                  properties:
                    bucket: authguard
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
        - type: link
          properties:
            namespace: wasi
            package: http
            interfaces: [outgoing-handler]
            target:
              name: httpclient
    - name: records-store
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-records-store:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: recordsstore-bucket
                  properties:
                    bucket: recordsstore
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: validate
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-validate:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: search-index
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-search-index:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: searchindex-bucket
                  properties:
                    bucket: searchindex
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: upload-policy
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-upload-policy:0.1.0
        config:
          - name: upload-policy-config
            properties:
              allowed-types: "image/png,image/jpeg,image/webp,image/gif"
              max-size: "2097152"
              ticket-ttl: "300"
              ticket-secret: "vet-upload-secret"
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: blob-store
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-blob-store:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: blobstore-bucket
                  properties:
                    bucket: blobstore
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: fsm-workflow
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-fsm-workflow:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: fsmworkflow-bucket
                  properties:
                    bucket: fsmworkflow
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: money
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-money:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: markdown
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-markdown:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: csv
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-csv:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: pii-redact
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-pii-redact:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: otp
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-otp:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: otp-bucket
                  properties:
                    bucket: otp
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: secrets-vault
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-secrets-vault:0.1.0
        config:
          - name: secrets-vault-config
            properties:
              master-key: "dmV0LWNsaW5pYy1kZW1vLW1hc3Rlci1rZXktMzJiISE="
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
            namespace: wasi
            package: keyvalue
            interfaces: [store, atomics]
            target:
              name: keyvalue-nats
              config:
                - name: secretsvault-bucket
                  properties:
                    bucket: secretsvault
                    cluster_uri: nats://nats.wasmcloud.svc.cluster.local:4222
                    enable_bucket_auto_create: "true"
    - name: pagination
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-pagination:0.1.0
        config:
          - name: pagination-config
            properties:
              max-page-size: "100"
              cursor-secret: "vet-cursor-secret"
      traits:
        - type: spreadscaler
          properties:
            instances: 1
    - name: i18n-catalog
      type: component
