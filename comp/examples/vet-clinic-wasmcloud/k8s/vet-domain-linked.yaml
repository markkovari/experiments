    - name: cache
      type: component
      properties:
        image: oci://registry.wasmcloud.svc.cluster.local:5000/vet-cache:0.1.0
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            name: default
