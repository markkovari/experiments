# WIT dependencies for auth:identity. Versions are pinned in ../wkg.lock and
# vendored under ./deps/. Re-fetch with `wkg wit fetch` (or `just vendor`).
#
# These mirror the `import wasi:*` statements in auth.wit's `authority` world.
