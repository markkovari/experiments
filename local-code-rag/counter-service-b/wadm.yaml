apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: counter-service-b
  annotations:
    version: v0.0.1
    description: "HTTP counter service B using WASI KV"
spec:
  components:
    - name: counter
      type: component
      properties:
        image: file://./build/counter_service_b_s.wasm
      traits:
        - type: spreadscaler
          properties:
            instances: 1
        - type: link
          properties:
            target:
              name: kvredis
              config:
                - name: redis-url
                  properties:
                    url: redis://0.0.0.0:6379
            namespace: wasi
            package: keyvalue
            interfaces: [atomics, store]

    - name: kvredis
      type: capability
      properties:
        image: ghcr.io/wasmcloud/keyvalue-redis:0.30.0

    - name: httpserver
      type: capability
      properties:
        image: ghcr.io/wasmcloud/http-server:0.27.0
      traits:
        - type: link
          properties:
            target:
              name: counter
            namespace: wasi
            package: http
            interfaces: [incoming-handler]
            source:
              config:
                - name: default-http
                  properties:
                    address: 0.0.0.0:8081
