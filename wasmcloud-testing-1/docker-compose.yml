services:
  # NATS server with JetStream enabled
  nats:
    image: nats:2.10-alpine
    container_name: wasmcloud-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"  # Client connections
      - "6222:6222"  # Cluster connections
      - "8222:8222"  # HTTP monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wasmcloud

  # Local OCI registry for storing component artifacts
  registry:
    image: registry:2.8
    container_name: wasmcloud-registry
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - wasmcloud

  # wasmCloud host
  wasmcloud:
    image: wasmcloud/wasmcloud:canary
    container_name: wasmcloud-host
    environment:
      WASMCLOUD_NATS_HOST: nats
      WASMCLOUD_NATS_PORT: 4222
      WASMCLOUD_RPC_HOST: nats
      WASMCLOUD_RPC_PORT: 4222
      WASMCLOUD_CTL_HOST: nats
      WASMCLOUD_CTL_PORT: 4222
      WASMCLOUD_PROV_RPC_HOST: nats
      WASMCLOUD_PROV_RPC_PORT: 4222
      WASMCLOUD_ALLOW_LATEST: "true"
      WASMCLOUD_OCI_ALLOWED_INSECURE: "registry:5000"
      RUST_LOG: "info,wasmcloud=debug"
    ports:
      - "4000:4000"  # wasmCloud API
      - "8081:8080"  # HTTP server (deployed via application)
    depends_on:
      nats:
        condition: service_healthy
      registry:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - wasmcloud

volumes:
  nats_data:
  registry_data:

networks:
  wasmcloud:
    driver: bridge
