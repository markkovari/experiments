# Extends the base docker-compose.yml for testing
services:
  # Builder service to compile the Rust component
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasmcloud-builder
    volumes:
      - ./:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    command: ["wash", "build"]
    networks:
      - wasmcloud

  # Test runner service
  test-runner:
    image: rust:1.75-slim
    container_name: wasmcloud-test-runner
    working_dir: /app
    volumes:
      - ./:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      RUST_BACKTRACE: "1"
      RUST_LOG: "debug"
    depends_on:
      wasmcloud:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - wasmcloud
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y curl &&
        ./scripts/run-tests.sh e2e
      "

  # Deploy service - builds and deploys the application
  deployer:
    image: rust:1.75-slim
    container_name: wasmcloud-deployer
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      WASMCLOUD_HOST: "wasmcloud"
      NATS_HOST: "nats"
    depends_on:
      wasmcloud:
        condition: service_healthy
      builder:
        condition: service_completed_successfully
    networks:
      - wasmcloud
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y curl wget &&
        curl -s https://packagecloud.io/install/repositories/wasmcloud/core/script.deb.sh | bash &&
        apt-get update &&
        apt-get install -y wash-cli &&
        ./scripts/wait-for-ready.sh &&
        wash app deploy wadm.yaml &&
        sleep 10
      "

volumes:
  cargo_cache:
  target_cache:

networks:
  wasmcloud:
    external: true
    name: wasmcloud-testing-1_wasmcloud
